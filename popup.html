<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dead Internet Bot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 16px;
      margin: 0;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    button {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #333;
    }

    #result {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .muted {
      color: #666;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>Dead Internet Bot</h1>
  <button id="checkBtn">Check current page</button>
  <div id="result">Click the button to test the current tab.</div>
  <div class="muted">First milestone: detect YouTube Shorts.</div>

  <script src="popup.js"></script>
</body>
</html>
